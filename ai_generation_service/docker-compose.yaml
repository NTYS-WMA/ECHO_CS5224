version: "3.8"

services:
  ai-generation-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-generation-service
    ports:
      - "8003:8003"
    environment:
      # AWS credentials are inherited from EC2 IAM Role automatically
      # If not using IAM Role, uncomment and set these:
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      - AWS_DEFAULT_REGION=ap-southeast-1

      # Service configuration (prefix: AI_GEN_)
      - AI_GEN_PORT=8003
      - AI_GEN_BEDROCK_REGION=ap-southeast-1
      - AI_GEN_BEDROCK_MODEL_ID=apac.anthropic.claude-sonnet-4-20250514-v1:0
      - AI_GEN_BEDROCK_EMBEDDING_MODEL_ID=cohere.embed-multilingual-v3
      - AI_GEN_LOG_LEVEL=INFO

      # Event broker (disabled - stub implementation)
      - AI_GEN_EVENT_PUBLISH_ENABLED=false

      # DB Manager service for template persistence
      - AI_GEN_DB_MANAGER_URL=http://host.docker.internal:18087
      - AI_GEN_DB_MANAGER_API_KEY=echo-db-manager-service-2026
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
